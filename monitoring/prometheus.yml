global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: terra-api
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: postgres
    static_configs:
      - targets: ['host.docker.internal:9187']  # postgres_exporter

alerting:
  alertmanagers: []

rule_files: []

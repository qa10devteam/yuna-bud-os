name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages (no network in unit tests)
        run: |
          pip install fastapi uvicorn pydantic pydantic-settings sqlalchemy alembic psycopg2-binary httpx pytest pytest-asyncio

      - name: Install terra packages
        run: |
          pip install -e packages/shared -e packages/db -e services/api

      - name: Run unit tests (zero network)
        run: pytest -q tests/

  ui-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

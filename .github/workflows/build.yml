name: Build & Scan Docker Images
'on':
  push:
    branches:
    - main
jobs:
  build-images:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build & push API image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.api
        platforms: linux/amd64
        push: true
        tags: 'ghcr.io/qa10devteam/terra-os-api:${{ github.sha }}

          ghcr.io/qa10devteam/terra-os-api:latest'
        cache-from: type=gha
        cache-to: type=gha,mode=max
    - name: Build & push UI image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.ui
        platforms: linux/amd64
        push: true
        tags: 'ghcr.io/qa10devteam/terra-os-ui:${{ github.sha }}

          ghcr.io/qa10devteam/terra-os-ui:latest'
        cache-from: type=gha
        cache-to: type=gha,mode=max
    - name: Trivy scan – API (HIGH/CRITICAL CVE)
      uses: aquasecurity/trivy-action@master
      continue-on-error: true
      with:
        image-ref: ghcr.io/qa10devteam/terra-os-api:${{ github.sha }}
        format: sarif
        output: trivy-api.sarif
        severity: HIGH,CRITICAL
        exit-code: '1'
    - name: Trivy scan – UI (HIGH/CRITICAL CVE)
      uses: aquasecurity/trivy-action@master
      continue-on-error: true
      with:
        image-ref: ghcr.io/qa10devteam/terra-os-ui:${{ github.sha }}
        format: sarif
        output: trivy-ui.sarif
        severity: HIGH,CRITICAL
        exit-code: '1'
    - name: Upload Trivy SARIF reports
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: trivy-api.sarif

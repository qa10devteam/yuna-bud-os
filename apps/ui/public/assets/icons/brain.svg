  <path d="M20 40 Q24 42 22 46" fill="none" stroke="#D97706" stroke-width="1.5" stroke-linecap="round" />
  <!-- Right hemisphere folds -->
  <path d="M46 20 Q42 24 46 28" fill="none" stroke="#D97706" stroke-width="1.5" stroke-linecap="round" />

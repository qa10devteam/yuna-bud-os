  <path d="M44 40 Q40 42 42 46" fill="none" stroke="#D97706" stroke-width="1.5" stroke-linecap="round" />
  <!-- Neural network dots -->
  <circle cx="20" cy="18" r="2" fill="#FCD34D" />
  <circle cx="44" cy="18" r="2" fill="#FCD34D" />
  <circle cx="16" cy="30" r="2" fill="#FCD34D" />

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -W ignore::DeprecationWarning:starlette -W ignore::DeprecationWarning:fastapi
# Paths — services/api LAST so terra-os/services (engine, ingestion) wins first
pythonpath =
    .
    packages/vendor
    packages/shared
    packages/db
    services/estimator
    services/api

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -W ignore::DeprecationWarning:starlette -W ignore::DeprecationWarning:fastapi --timeout=30 --ignore=tests/test_export.py --ignore=tests/test_integration_live.py
# Paths — services/api LAST so terra-os/services (engine, ingestion) wins first
pythonpath =
    .
    packages/vendor
    packages/shared
    packages/db
    services/estimator
    services/api

markers =
    integration: marks tests that require a live PostgreSQL database (deselect with -m "not integration")

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <!-- Cargo bed -->
  <rect x="4" y="22" width="32" height="24" rx="3" fill="#6B7280" stroke="#4B5563" stroke-width="2" />
  <rect x="6" y="24" width="28" height="20" rx="2" fill="#9CA3AF" />
  <!-- Cab -->
  <rect x="36" y="16" width="22" height="30" rx="4" fill="#4B5563" stroke="#374151" stroke-width="2" />
  <rect x="38" y="18" width="18" height="26" rx="3" fill="#6B7280" />
  <!-- Windshield -->
  <rect x="42" y="20" width="12" height="12" rx="2" fill="#0EA5E9" />
  <rect x="44" y="22" width="8" height="4" rx="1" fill="#38BDF8" opacity="0.5" />
  <!-- Door line -->
  <line x1="48" y1="32" x2="48" y2="44" stroke="#374151" stroke-width="1.5" />
  <!-- Door handle -->
  <rect x="50" y="34" width="6" height="2" rx="1" fill="#374151" />
  <!-- Front bumper -->
  <rect x="56" y="40" width="4" height="6" rx="2" fill="#4B5563" />
  <!-- Rear bumper -->
  <rect x="2" y="40" width="4" height="6" rx="2" fill="#4B5563" />
  <!-- Wheels -->
  <circle cx="14" cy="48" r="6" fill="#1F2937" />
  <circle cx="14" cy="48" r="4" fill="#374151" />
  <circle cx="14" cy="48" r="2" fill="#6B7280" />
  <circle cx="48" cy="48" r="6" fill="#1F2937" />
  <circle cx="48" cy="48" r="4" fill="#374151" />
  <circle cx="48" cy="48" r="2" fill="#6B7280" />
  <!-- Headlight -->
  <circle cx="58" cy="38" r="2" fill="#FCD34D" />
  <!-- Tail light -->
  <circle cx="4" cy="38" r="2" fill="#EF4444" />
</svg>

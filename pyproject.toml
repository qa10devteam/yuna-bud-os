[tool.ruff]
line-length = 120
target-version = "py312"
extend-exclude = [".next", "node_modules", "apps/ui", "apps/desktop", "apps/mobile"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.black]
line-length = 120
target-version = ["py312"]
exclude = '''/(\.next|node_modules|apps)'''

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
exclude = ["apps/", "node_modules/", ".next/"]
